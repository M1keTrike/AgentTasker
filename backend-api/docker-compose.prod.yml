# =============================================
# Producción — ejecutar con:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =============================================
services:
  api:
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_LOGGING=false

  postgres:
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
