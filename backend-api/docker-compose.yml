# =============================================
# Base — compartido entre todos los entornos.
# No ejecutar directamente.
# =============================================
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentasker-api
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_LOGGING=${DB_LOGGING}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agentasker-network

  postgres:
    image: postgres:16-alpine
    container_name: agentasker-postgres
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentasker-network

networks:
  agentasker-network:
    driver: bridge
